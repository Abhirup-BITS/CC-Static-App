<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Abhirup</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
        }
        header {
            background-color: #2c3e50;
            padding: 15px 40px;
            display: flex;
            justify-content: flex-end;
        }
        header a {
            color: #ecf0f1;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
        }
        header a:hover {
            color: #1abc9c;
        }
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .main h2 {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #1abc9c;
            margin-bottom: 10px;
        }
        .main h1 {
            font-size: 2.5rem;
            margin: 10px 0;
        }
        .main p {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        .buttons a {
            padding: 12px 24px;
            border: 2px solid #2c3e50;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            color: #2c3e50;
            transition: all 0.3s ease;
        }
        .buttons a:hover {
            background-color: #2c3e50;
            color: #ecf0f1;
        }
    </style>
</head>
<body>
    <header>
        <a href="#stack">STACK</a>
        <a href="#projects">PROJECTS</a>
        <a href="#journey">JOURNEY</a>

    <div class="main">

        <p>
            Student currently doing CC Lab Assignment at BITS Pilani.  
            Exploring cloud deployment, automation workflows, and neat HTML/CSS design.
        </p>
        <div class="buttons">
            <a href="#projects">VIEW PROJECTS</a>
            <a href="#contact">GET IN TOUCH</a>
        </div>
    </div>
</body>
</html>
