<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Portfolio - Abhirup</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1abc9c, #3498db, #9b59b6);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #ecf0f1;
        }
        @keyframes gradientShift {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }
        header {
            background-color: rgba(44, 62, 80, 0.85);
            padding: 15px 40px;
            display: flex;
            justify-content: flex-end;
            position: sticky;
            top: 0;
        }
        header a {
            color: #ecf0f1;
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            transition: color 0.3s ease;
        }
        header a:hover {
            color: #f1c40f;
        }
        .main {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            text-align: center;
        }
        .main h2 {
            font-size: 1rem;
            letter-spacing: 2px;
            color: #f1c40f;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .main h1 {
            font-size: 3rem;
            margin: 10px 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.4);
        }
        .main p {
            max-width: 600px;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        .buttons a {
            padding: 12px 24px;
            border: 2px solid #ecf0f1;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            color: #ecf0f1;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(241,196,15,0.6);
        }
        .buttons a:hover {
            background-color: #f1c40f;
            color: #2c3e50;
            box-shadow: 0 0 20px rgba(241,196,15,0.9);
        }
    </style>
</head>
<body>
    <header>
        <a href="#stack">STACK</a>
        <a href="#projects">PROJECTS</a>
        <a href="#journey">JOURNEY</a>
        <a href="#contact">CONTACT</a>
    </header>
    <div class="main">
        <h2>OPEN TO CLOUD ENGINEERING ROLES • BITS PILANI</h2>
        <h1>Abhirup</h1>
        <p>
            Student currently doing CC Lab Assignment at BITS Pilani.  
            Exploring cloud deployment, automation workflows, and neat HTML/CSS design.
        </p>
        <div class="buttons">
            <a href="#projects">VIEW PROJECTS</a>
            <a href="#contact">GET IN TOUCH</a>
        </div>
    </div>
</body>
</html>
